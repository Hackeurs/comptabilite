services:
  - type: web
    name: comptabilite-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_HOST
        fromDatabase:
          name: comptabilite-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: comptabilite-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: comptabilite-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: comptabilite-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: comptabilite-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 30d
      - key: CLIENT_URL
        value: '*'

databases:
  - name: comptabilite-db
    databaseName: comptabilite_db
    user: comptabilite_user
    plan: free
